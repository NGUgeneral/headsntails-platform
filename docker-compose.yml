version: '3.8'

networks:
  flagship-mesh:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  postgres:
    image: postgres:15-alpine
    container_name: flagship-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - flagship-mesh
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flagship-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - flagship-mesh
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  flagship-engine:
    container_name: flagship-engine
    build:
      context: ../flagship
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}

      - RATE_LIMITER_URL=${RATE_LIMITER_INTERNAL_URL}
      - JWT_SECRET_KEY=${LOCAL_JWT_SECRET}

      # =========================================================================
      # REDIS ALIGNMENT MATRIX
      # =========================================================================
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
    ports:
      - "8080:8080"
    networks:
      - flagship-mesh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  rate-limiter:
    container_name: flagship-rate-limiter
    build:
      context: ../rate-limiter
      dockerfile: Dockerfile
    command: >
      sh -c "pip install -r requirements.txt && 
             uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4"
    environment:
      - REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0
    ports:
      - "8000:8000"
    networks:
      - flagship-mesh
    depends_on:
      redis:
        condition: service_healthy

  jwt-authority:
    container_name: flagship-jwt-authority
    build:
      context: ../jwt-authority
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - JWT_SECRET_KEY=${LOCAL_JWT_SECRET}
    ports:
      - "3000:3000"
    networks:
      - flagship-mesh