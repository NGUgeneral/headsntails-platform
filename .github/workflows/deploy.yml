name: Continuous Integration (headsntails-platform)

on:
  # 1. Verification Gate: Intercept broken changes before they can hit main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

  # 2. Deployment Gate: Trigger production container packaging post-merge
  push:
    branches:
      - main

jobs:
  # --- STAGE 1: PLATFORM END-TO-END INTEGRATION GATE ---
  e2e-matrix:
    name: System Integration & E2E Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Orchestrate Ephemeral System Grid
      run: |
        # Build dependencies, start database/cache layers, and run the hermetic tester
        docker compose -f tests/docker-compose.e2e.yml up \
          --build \
          --abort-on-container-exit \
          --exit-code-from e2e-tester

    - name: Automated Post-Execution Environment Teardown
      if: always() # Forces cleanup to run even if the test step aborts or fails
      run: |
        docker compose -f tests/docker-compose.e2e.yml down -v

  # --- STAGE 2: PACKAGING GATE (Main Branch Only) ---
  package:
    name: Build Production Ingress Gateway
    runs-on: ubuntu-latest
    needs: e2e-matrix # Absolute Rule: Block packaging if integration tests break
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compile Cloud-Agnostic Production Gateway Image
      run: |
        docker build -t headsntails-platform:latest -f tests/Dockerfile.e2e tests/
