events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Dynamic DNS Resolution for Docker Networks
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name localhost;

        # ==========================================
        # 1. PUBLIC ENDPOINTS (Accessible to Internet)
        # ==========================================
        
        # ONLY allow the refresh loop to pass through the public gateway
        location /api/v1/auth/refresh {
            # 1. Handle CORS Preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # 2. Add CORS headers to actual GET/POST requests
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            proxy_pass http://jwt-authority:3000/refresh; # Maps directly to your internal refresh route
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Public Feature Flag Evaluation endpoints
        location /api/v1/flags/ {
            # 1. Handle CORS Preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # 2. Add CORS headers to actual GET/POST requests
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            proxy_pass http://flagship-engine:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }


        # ==========================================
        # 2. RESTRICTED INTERNAL ENDPOINTS (IP Guarded)
        # ==========================================

        # Guarded JWT Authority Master Ingress (Issue, Docs, Validate, etc.)
        # This catches any other /api/v1/auth/* request that isn't explicitly /refresh
        location /api/v1/auth/ {
            # IP Access Whitelist Matrix
            allow 127.0.0.1;        # Allow Localhost loopback
            allow 192.168.1.0/24;   # Allow your local home/office Wi-Fi subnet range
            deny all;               # Drop everything else instantly with a 403 Forbidden

            proxy_pass http://jwt-authority:3000/;
            proxy_set_header Host $host;
        }

        # Guarded Rate Limiter Documentation
        location /api/v1/limiter/docs {
            allow 127.0.0.1;
            allow 192.168.1.0/24;
            deny all;

            proxy_pass http://rate-limiter:8000/docs;
            proxy_set_header Host $host;
        }

        # Guarded Rate Limiter Open API Schema file
        location /api/v1/limiter/openapi.json {
            allow 127.0.0.1;
            allow 192.168.1.0/24;
            deny all;

            proxy_pass http://rate-limiter:8000/openapi.json;
            proxy_set_header Host $host;
        }


        # ==========================================
        # 3. GLOBAL FALLBACK
        # ==========================================
        location /health {
            return 200 '{"status": "Gateway Operational"}';
            add_header Content-Type application/json;
        }
    }
}