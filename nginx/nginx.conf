events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name localhost;

        # ==========================================
        # 1. PUBLIC ENDPOINTS
        # ==========================================
        
        # Public Token Refresh Line
        # Nginx Input:  /api/v1/auth/refresh
        # App Receives: /api/v1/refresh
        location /api/v1/auth/refresh {
            # 1. Handle CORS Preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # 2. Add CORS headers to actual GET/POST requests
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            proxy_pass http://jwt-authority:3000/api/v1/refresh; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Public Feature Flag Evaluation endpoints
        # Nginx Input:  /api/v1/flags/get
        # App Receives: /api/v1/get
        location /api/v1/flags/ {
            # 1. Handle CORS Preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # 2. Add CORS headers to actual GET/POST requests
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            # Trailing slash maps the remainder of the URI directly to headsntails-core's /api/v1/ prefix
            proxy_pass http://headsntails-core:8080/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==========================================
        # 2. RESTRICTED INTERNAL ENDPOINTS (IP Guarded)
        # ==========================================

        # Guarded JWT Authority Master Ingress
        # Nginx Input:  /api/v1/auth/validate
        # App Receives: /api/v1/validate
        location /api/v1/auth/ {
            allow 127.0.0.1;        
            allow 192.168.1.0/24;   
            deny all;               

            proxy_pass http://jwt-authority:3000/api/v1/;
            proxy_set_header Host $host;
        }

        # Guarded Rate Limiter 
        # Nginx Input:  /api/v1/limiter/docs  -> App Receives: /api/v1/docs
        # Nginx Input:  /api/v1/limiter/is_allowed -> App Receives: /api/v1/is_allowed
        location /api/v1/limiter/ {
            allow 127.0.0.1;
            allow 192.168.1.0/24;
            deny all;

            proxy_pass http://rate-limiter:8000/api/v1/;
            proxy_set_header Host $host;
        }

        # ==========================================
        # 3. GLOBAL FALLBACK
        # ==========================================
        location /health {
            return 200 '{"status": "Gateway Operational"}';
            add_header Content-Type application/json;
        }

        # ==========================================
        # ----SWAGGER UI AND OPENAPI SPEC ROUTING---
        # ==========================================
        location /docs/ {
            proxy_pass http://swagger-ui:8080/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs/specs/headsntails-core.json {
            proxy_pass http://headsntails-core:8080/docs/doc.json;
            proxy_set_header Host $host;
        }

        location /docs/specs/jwt-authority.json {
            proxy_pass http://jwt-authority:3000/openapi.json;
            proxy_set_header Host $host;
        }
    }
}